<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>entconn Price Lookup</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#0f1117;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,sans-serif;}
.lock-wrap{background:#1a1d27;border:1px solid #2a2d3a;border-radius:18px;padding:48px 40px;width:100%;max-width:380px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.5);}
.lock-icon{width:56px;height:56px;background:rgba(26,107,58,.15);border:1.5px solid rgba(26,107,58,.3);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px;color:#1a6b3a;}
h1{font-size:18px;font-weight:700;color:#fff;margin-bottom:6px;letter-spacing:-.02em;}
p{font-size:13px;color:#888;margin-bottom:28px;line-height:1.5;}
.field{position:relative;margin-bottom:14px;}
input[type=password]{width:100%;height:46px;background:#0f1117;border:1.5px solid #2a2d3a;border-radius:9px;padding:0 44px 0 14px;font-size:14px;color:#fff;outline:none;transition:border-color .15s;}
input[type=password]:focus{border-color:#1a6b3a;box-shadow:0 0 0 3px rgba(26,107,58,.12);}
input[type=password]::placeholder{color:#444;}
.eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#555;padding:4px;transition:color .15s;}
.eye:hover{color:#888;}
button.unlock{width:100%;height:46px;background:#1a6b3a;border:none;border-radius:9px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;transition:background .15s;letter-spacing:.01em;}
button.unlock:hover{background:#14522d;}
button.unlock:disabled{opacity:.5;cursor:not-allowed;}
.err{font-size:12px;color:#e05a3a;margin-top:10px;min-height:18px;font-weight:600;}
.spinner{display:none;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.hint{font-size:11px;color:#444;margin-top:18px;}
</style>
</head>
<body>
<div class="lock-wrap">
  <div class="lock-icon">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <h1>entconn Price Lookup</h1>
  <p>Enter your password to access the inventory search tool.</p>
  <div class="field">
    <input type="password" id="pw" placeholder="Password" autocomplete="current-password">
    <button class="eye" id="eyeBtn" tabindex="-1" onclick="toggleEye()">
      <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>
  <button class="unlock" id="unlockBtn" onclick="unlock()">Unlock</button>
  <div class="err" id="err"></div>
  <div class="spinner" id="spinner"></div>
  <div class="hint">entconn internal tool · access restricted</div>
</div>

function b64ToBytes(b64) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for(let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf;
}

document.getElementById('pw').addEventListener('keydown', e => {
  if(e.key === 'Enter') unlock();
});

function toggleEye() {
  const pw = document.getElementById('pw');
  const icon = document.getElementById('eyeIcon');
  if(pw.type === 'password') {
    pw.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    pw.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

async function unlock() {
  const pw = document.getElementById('pw').value;
  if(!pw) { document.getElementById('err').textContent = 'Please enter a password.'; return; }

  const btn = document.getElementById('unlockBtn');
  const spinner = document.getElementById('spinner');
  const err = document.getElementById('err');

  btn.disabled = true;
  btn.textContent = 'Decrypting…';
  spinner.style.display = 'block';
  err.textContent = '';

  // Small delay so the UI updates before the crypto work begins
  await new Promise(r => setTimeout(r, 50));

  try {
    const saltBytes = b64ToBytes(SALT);
    const ivBytes   = b64ToBytes(IV);
    const ctBytes   = b64ToBytes(CT);
    const pwBytes   = new TextEncoder().encode(pw);

    // Derive key using PBKDF2 (310,000 iterations, SHA-256)
    const keyMaterial = await crypto.subtle.importKey('raw', pwBytes, 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:saltBytes, iterations:310000, hash:'SHA-256' },
      keyMaterial,
      { name:'AES-GCM', length:256 },
      false,
      ['decrypt']
    );

    // Decrypt
    const decrypted = await crypto.subtle.decrypt({ name:'AES-GCM', iv:ivBytes }, key, ctBytes);

    // Decode and launch the app
    const html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();

  } catch(e) {
    err.textContent = 'Incorrect password. Please try again.';
    btn.disabled = false;
    btn.textContent = 'Unlock';
    spinner.style.display = 'none';
    document.getElementById('pw').select();
  }
}
</script>
